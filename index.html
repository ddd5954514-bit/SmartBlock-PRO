<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBlock Pro | חווית גלישה נקייה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(to left, #2980b9, #6dd5fa);
            --text-dark: #2d3436;
            --text-light: #ffffff;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-card: rgba(255, 255, 255, 0.8);
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Assistant', sans-serif;
            margin: 0;
            padding: 0;
            /* רקע מודרני ומרהיב */
            background-image: var(--primary-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- תפריט ניווט --- */
        nav {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 1rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.6rem;
            color: #4a148c;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            margin-right: 25px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .nav-links a:hover { color: #6c5ce7; }

        /* --- לוגו CSS מודרני --- */
        .logo-box {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
        }

        .smartblock-logo {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 5px solid rgba(255,255,255,0.5);
        }

        /* סמל מגן עם S וברק ב-SVG */
        .smartblock-logo svg {
            width: 100px;
            height: 100px;
        }

        /* --- אזור גיבור (Hero) --- */
        header {
            text-align: center;
            padding: 6rem 1rem;
            flex-grow: 1;
        }

        .hero-card {
            background: var(--glass-card);
            backdrop-filter: blur(15px);
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 {
            font-size: 3.8rem;
            margin: 0 0 1rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.5rem;
            color: #555;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        /* --- כפתור הורדה משופר --- */
        .btn-download {
            display: inline-block;
            background: var(--secondary-gradient);
            color: white;
            padding: 1.2rem 3.5rem;
            border-radius: 100px;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.4);
            transition: all 0.3s ease;
        }

        .btn-download:hover {
            box-shadow: 0 15px 35px rgba(52, 152, 219, 0.6);
            transform: translateY(-3px);
        }

        /* --- כותרת תחתונה --- */
        footer {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            font-size: 1rem;
            margin-top: auto;
        }

        footer a { color: var(--text-light); text-decoration: underline; }

        /* התאמה לנייד */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .hero-card { padding: 2rem; }
            nav { padding: 1rem 5%; }
            .nav-links { display: none; } /* הסתרת תפריט בנייד לפישט */
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">
        <div style="width: 30px; height: 30px;">
            <svg viewBox="0 0 100 100">
                <path d="M50 5 L90 25 V75 L50 95 L10 75 V25 Z" fill="#6c5ce7"/>
            }
            </svg>
        </div>
        SmartBlock Pro
    </a>
    <div class="nav-links">
        <a href="index.html">דף הבית</a>
        <a href="privacy.html">פרטיות</a>
    </div>
</nav>

<header>
    <div class="logo-box">
        <div class="smartblock-logo">
            <svg viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path d="M50 5 L95 25 V75 L50 95 L5 75 V25 Z" fill="url(#grad1)" stroke="white" stroke-width="2"/>
                <path d="M45 40 L60 30 L55 50 L65 60 L50 70 L55 50 Z" fill="#ffeb3b" stroke="#fbc02d" stroke-width="1.5"/>
            </svg>
        </div>
    </div>

    <div class="hero-card">
        <h1>הגלישה שלך, נקייה.</h1>
        <p class="tagline">SmartBlock Pro חוסם את כל הפרסומות באתרי חדשות ובפרוג. באופן אוטומטי, ובלי פשרות.</p>
        <a href="https://mitmachim.top/assets/uploads/files/1775167189437-1.3-%D7%AA%D7%95%D7%A1%D7%A3.zip" class="btn-download">הורדה ישירה (ZIP)</a>
    </div>
</header>

<footer>
    <p>© 2026 SmartBlock Pro | כל הזכויות שמורות. נבנה עבור קהילת <a href="https://mitmachim.top/">מתמחים טופ</a>.</p>
</footer>

</body>
</html>
